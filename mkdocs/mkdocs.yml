site_name: DocsDog
site_description: Open specification for expressing semantic relationships between source code and external artifacts
site_author: Hugo0Vaz
repo_url: https://github.com/Hugo0Vaz/docsdog
repo_name: Hugo0Vaz/docsdog

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - tables
  - toc:
      permalink: true

docs_dir: docs

nav:
  - Home: index.md
  - Specification: specification.md
  - Schemas:
      - Scan Schema: scan.schema.json
      - Relationship Schema: relationship.schema.json
      - Scan Example: scan-example.json

plugins:
  - search
  - gen-files:
      scripts:
        - gen_docs.py
